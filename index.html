<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreakWatchers — NBA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #080b12;
    --surface:  #0f1320;
    --card:     #141926;
    --border:   #1c2438;
    --border2:  #222d45;
    --hot:      #ff5c3a;
    --hot-dim:  rgba(255,92,58,.12);
    --cold:     #38b6ff;
    --cold-dim: rgba(56,182,255,.12);
    --gold:     #f0c040;
    --green:    #3ddc97;
    --text:     #e8eaf2;
    --muted:    #5a6580;
    --muted2:   #8090b0;
    --accent:   #6366f1;
    --acc2:     #818cf8;
    --live:     #ff3e3e;
    --pts:      #f97316;
    --reb:      #22d3ee;
    --ast:      #a78bfa;
    --tpm:      #fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; min-height: 100vh; }

  /* ─── HEADER ─────────────────────────────── */
  header {
    display: flex; align-items: center; gap: 18px;
    padding: 16px 28px 12px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: rgba(8,11,18,.92);
    backdrop-filter: blur(10px);
    z-index: 100;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 2px; line-height: 1; background: linear-gradient(135deg, #fff 30%, var(--acc2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .logo-sub { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted2); letter-spacing: 3px; text-transform: uppercase; margin-top: 2px; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }
  #live-badge { display: none; align-items: center; gap: 6px; background: rgba(255,62,62,.12); border: 1px solid rgba(255,62,62,.3); border-radius: 20px; padding: 4px 12px; font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; color: var(--live); letter-spacing: 1px; }
  #live-badge.active { display: flex; }
  .live-dot { width: 6px; height: 6px; background: var(--live); border-radius: 50%; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
  #last-update { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
  #refresh-btn { background: var(--card); border: 1px solid var(--border2); color: var(--muted2); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; transition: all .15s; }
  #refresh-btn:hover { border-color: var(--accent); color: var(--text); }
  #refresh-btn:disabled { opacity: .4; cursor: not-allowed; }

  /* ─── LIVE BAR ────────────────────────────── */
  #live-bar { display: none; padding: 7px 28px; background: rgba(255,62,62,.05); border-bottom: 1px solid rgba(255,62,62,.15); gap: 8px; overflow-x: auto; scrollbar-width: none; }
  #live-bar.active { display: flex; }
  .live-chip { flex-shrink: 0; background: rgba(255,62,62,.08); border: 1px solid rgba(255,62,62,.2); border-radius: 6px; padding: 3px 10px; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--live); white-space: nowrap; cursor: pointer; transition: background .15s; }
  .live-chip:hover { background: rgba(255,62,62,.16); }
  .final-chip { flex-shrink: 0; background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); white-space: nowrap; }

  /* ─── PAGE TABS ──────────────────────────── */
  .page-tabs { display: flex; background: var(--surface); padding: 0 28px; border-bottom: 1px solid var(--border); }
  .page-tab { padding: 10px 18px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s; }
  .page-tab:hover { color: var(--muted2); }
  .page-tab.active { color: var(--text); border-bottom-color: var(--accent); }

  /* ─── CONTROLS ───────────────────────────── */
  .controls { display: flex; align-items: center; gap: 10px; padding: 12px 28px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .ctrl-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-right: 2px; }
  .pill-group { display: flex; gap: 4px; flex-wrap: wrap; }
  .pill { background: var(--card); border: 1px solid var(--border2); color: var(--muted2); padding: 5px 12px; border-radius: 20px; cursor: pointer; font-size: 11px; font-weight: 500; transition: all .15s; white-space: nowrap; }
  .pill:hover { border-color: var(--accent); color: var(--text); }
  .pill.active-hot  { background: var(--hot-dim);  border-color: var(--hot);    color: var(--hot); }
  .pill.active-cold { background: var(--cold-dim); border-color: var(--cold);   color: var(--cold); }
  .pill.active-all  { background: rgba(99,102,241,.12); border-color: var(--accent); color: var(--acc2); }
  .sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }
  .search-wrap { margin-left: auto; position: relative; }
  .search-wrap input { background: var(--card); border: 1px solid var(--border2); color: var(--text); padding: 6px 12px 6px 28px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 12px; width: 180px; outline: none; transition: border-color .15s; }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 13px; pointer-events: none; }

  /* ─── MAIN LAYOUT ────────────────────────── */
  #players-page { display: flex; }
  #players-page.hidden { display: none; }
  #thresholds-page { display: none; padding: 20px 28px; }
  #thresholds-page.active { display: block; }
  #games-page { display: none; padding: 20px 28px; }
  #games-page.active { display: block; }

  /* ─── STAT TABS (left nav) ───────────────── */
  .stat-nav { width: 68px; border-right: 1px solid var(--border); padding: 20px 0; display: flex; flex-direction: column; gap: 2px; min-height: calc(100vh - 140px); }
  .stat-tab { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 12px 0; cursor: pointer; border-left: 2px solid transparent; transition: all .15s; color: var(--muted); }
  .stat-tab:hover { color: var(--muted2); }
  .stat-tab.active { color: var(--text); border-left-color: var(--accent); background: rgba(99,102,241,.06); }
  .stat-tab .tab-icon { font-size: 18px; }
  .stat-tab .tab-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; }

  /* ─── CONTENT ────────────────────────────── */
  .content { flex: 1; padding: 20px 28px; overflow: hidden; }

  /* ─── SECTION HEADER ─────────────────────── */
  .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1.5px; }
  .section-title.hot  { color: var(--hot); }
  .section-title.cold { color: var(--cold); }
  .streak-meta { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1px; }
  .count-badge { margin-left: auto; background: var(--card); border: 1px solid var(--border2); border-radius: 20px; padding: 2px 10px; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted2); }

  /* ─── TABLE ──────────────────────────────── */
  .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 28px; }
  table { width: 100%; border-collapse: collapse; min-width: 700px; }
  thead tr { background: var(--surface); border-bottom: 1px solid var(--border); }
  th { padding: 9px 12px; font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); text-align: left; white-space: nowrap; cursor: pointer; user-select: none; transition: color .15s; }
  th:hover { color: var(--muted2); }
  th.sort-asc::after { content: ' ↑'; color: var(--accent); }
  th.sort-desc::after { content: ' ↓'; color: var(--accent); }
  th:first-child { width: 36px; text-align: center; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,.022); }
  td { padding: 9px 12px; font-size: 12px; white-space: nowrap; }
  td:first-child { text-align: center; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
  .player-cell { display: flex; align-items: center; gap: 10px; }
  .player-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--border2); display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted2); flex-shrink: 0; overflow: hidden; }
  .player-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .player-name { font-weight: 600; font-size: 13px; }
  .player-team { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: .5px; margin-top: 1px; }
  td.mono { font-family: 'DM Mono', monospace; font-size: 11px; }
  .streak-cell { display: flex; align-items: center; gap: 8px; }
  .streak-num { font-family: 'Bebas Neue', sans-serif; font-size: 22px; line-height: 1; min-width: 36px; text-align: right; }
  .streak-num.hot  { color: var(--hot); }
  .streak-num.cold { color: var(--cold); }
  .streak-bar-wrap { flex: 1; height: 4px; background: var(--border2); border-radius: 2px; min-width: 60px; max-width: 100px; overflow: hidden; }
  .streak-bar { height: 100%; border-radius: 2px; transition: width .3s; }
  .streak-bar.hot  { background: linear-gradient(90deg, var(--hot), #ff9a3a); }
  .streak-bar.cold { background: linear-gradient(90deg, var(--cold), #38ffd0); }
  .rate-good { color: var(--green); }
  .rate-mid  { color: var(--gold); }
  .rate-low  { color: var(--muted2); }
  .gl-dots { display: flex; gap: 3px; align-items: center; }
  .gl-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .gl-dot.hit { background: var(--green); }
  .gl-dot.no  { background: var(--border2); }

  /* ─── STATE BOX ──────────────────────────── */
  .state-box { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 12px; color: var(--muted); }
  .spinner { width: 36px; height: 36px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .state-box .msg { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1px; text-align: center; }

  /* ─── GAMES PAGE ─────────────────────────── */
  .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .game-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; cursor: pointer; transition: all .15s; }
  .game-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .game-card.live-card { border-color: rgba(255,62,62,.3); }
  .game-card.live-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background: linear-gradient(90deg, var(--live), transparent); border-radius: 10px 10px 0 0; }
  .game-card { position: relative; }
  .gc-status { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
  .gc-status.live  { color: var(--live); }
  .gc-status.final { color: var(--muted); }
  .gc-status.pre   { color: var(--gold); }
  .gc-matchup { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .gc-team { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; }
  .gc-tri { font-family: 'Bebas Neue', sans-serif; font-size: 26px; line-height: 1; }
  .gc-name { font-size: 10px; color: var(--muted); text-align: center; }
  .gc-score-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .gc-score { font-family: 'Bebas Neue', sans-serif; font-size: 32px; line-height: 1; letter-spacing: 2px; }
  .gc-clock { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); }
  .gc-footer { margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); text-align: center; }

  /* ─── GAME DETAIL ────────────────────────── */
  #game-detail { display: none; }
  #game-detail.active { display: block; }
  .gd-header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
  .back-btn { background: var(--card); border: 1px solid var(--border2); color: var(--muted2); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 10px; transition: all .15s; }
  .back-btn:hover { border-color: var(--accent); color: var(--text); }
  .gd-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; }
  .gd-score { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted2); }
  .teams-split { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .team-panel { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .team-panel-header { background: var(--surface); padding: 10px 16px; font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 1px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .gp-row { display: flex; align-items: center; gap: 10px; padding: 8px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
  .gp-row:last-child { border-bottom: none; }
  .gp-row:hover { background: rgba(255,255,255,.022); }
  .gp-rank { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); width: 16px; text-align: center; flex-shrink: 0; }
  .gp-info { flex: 1; min-width: 0; }
  .gp-name { font-weight: 600; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .gp-stats { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); margin-top: 1px; }
  .gp-line { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted2); flex-shrink: 0; text-align: right; min-width: 55px; }
  .gp-badge { font-family: 'Bebas Neue', sans-serif; font-size: 20px; line-height: 1; flex-shrink: 0; }
  .gp-badge.hot  { color: var(--hot); }
  .gp-badge.cold { color: var(--cold); }
  .gp-badge.none { color: var(--border2); font-size: 12px; }

  /* ─── MODAL ──────────────────────────────── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(4px); z-index: 200; justify-content: center; align-items: flex-start; padding: 40px 20px; overflow-y: auto; }
  .modal-overlay.active { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border2); border-radius: 14px; width: 100%; max-width: 640px; overflow: hidden; animation: slideUp .2s ease; }
  @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .modal-header { display: flex; align-items: center; gap: 14px; padding: 18px 24px 14px; border-bottom: 1px solid var(--border); }
  .modal-avatar { width: 52px; height: 52px; border-radius: 50%; background: var(--border2); overflow: hidden; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted2); flex-shrink: 0; }
  .modal-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .modal-name { font-weight: 700; font-size: 17px; }
  .modal-meta { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 3px; }
  .modal-close { margin-left: auto; background: none; border: 1px solid var(--border2); color: var(--muted2); width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all .15s; flex-shrink: 0; }
  .modal-close:hover { border-color: var(--hot); color: var(--hot); }
  .modal-body { padding: 18px 24px; }
  .modal-section-title { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 1.5px; color: var(--muted2); margin-bottom: 10px; margin-top: 16px; }
  .modal-section-title:first-child { margin-top: 0; }
  .stat-snapshot { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; margin-bottom: 4px; }
  .snap-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 6px; text-align: center; }
  .snap-val { font-family: 'Bebas Neue', sans-serif; font-size: 22px; line-height: 1; color: var(--text); }
  .snap-lbl { font-family: 'DM Mono', monospace; font-size: 8px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 3px; }
  .streak-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
  .streak-pill { padding: 4px 10px; border-radius: 20px; font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; }
  .streak-pill.hot  { background: var(--hot-dim);  border: 1px solid var(--hot);    color: var(--hot); }
  .streak-pill.cold { background: var(--cold-dim); border: 1px solid var(--cold);   color: var(--cold); }
  .streak-pill.zero { background: var(--surface);  border: 1px solid var(--border2); color: var(--muted); }
  .gl-table { width: 100%; border-collapse: collapse; }
  .gl-table th { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); }
  .gl-table td { font-family: 'DM Mono', monospace; font-size: 11px; padding: 7px 8px; border-bottom: 1px solid var(--border); color: var(--muted2); }
  .gl-table tr:last-child td { border-bottom: none; }
  .gl-table tr.today-row td { background: rgba(99,102,241,.06); color: var(--text); }
  .gl-table td.hit-cell { color: var(--green); font-weight: 600; }

  /* ─── THRESHOLD PAGE ─────────────────────── */
  .thresh-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">StreakWatchers</div>
    <div class="logo-sub">NBA · Streak Intelligence</div>
  </div>
  <div id="live-badge"><div class="live-dot"></div>LIVE</div>
  <div class="header-right">
    <span id="last-update">—</span>
    <button id="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>
</header>

<div id="live-bar"></div>

<!-- PAGE TABS -->
<div class="page-tabs">
  <div class="page-tab active" onclick="setPage('players')">🏀 Players</div>
  <div class="page-tab" onclick="setPage('thresholds')">🎯 Thresholds</div>
  <div class="page-tab" onclick="setPage('games')">📅 Games</div>
</div>

<!-- PLAYERS CONTROLS -->
<div class="controls" id="players-controls">
  <span class="ctrl-label">Mode</span>
  <div class="pill-group">
    <div class="pill active-all" data-mode="all"  onclick="setMode('all')">All</div>
    <div class="pill" data-mode="hot"  onclick="setMode('hot')">🔥 Hot</div>
    <div class="pill" data-mode="cold" onclick="setMode('cold')">🧊 Cold</div>
  </div>
  <div class="sep"></div>
  <span class="ctrl-label">Min GP</span>
  <div class="pill-group">
    <div class="pill active-all" data-mingp="3"  onclick="setMinGP(3,this)">3</div>
    <div class="pill" data-mingp="5"  onclick="setMinGP(5,this)">5</div>
    <div class="pill" data-mingp="10" onclick="setMinGP(10,this)">10</div>
  </div>
  <div class="sep"></div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search-input" placeholder="Search player…" oninput="renderContent()">
  </div>
</div>

<!-- PLAYERS PAGE -->
<div id="players-page" class="main" style="display:flex">
  <nav class="stat-nav">
    <div class="stat-tab active" data-stat="pts" onclick="setStat('pts')"><span class="tab-icon">🏀</span><span class="tab-label">PTS</span></div>
    <div class="stat-tab" data-stat="reb" onclick="setStat('reb')"><span class="tab-icon">💪</span><span class="tab-label">REB</span></div>
    <div class="stat-tab" data-stat="ast" onclick="setStat('ast')"><span class="tab-icon">🎯</span><span class="tab-label">AST</span></div>
    <div class="stat-tab" data-stat="tpm" onclick="setStat('tpm')"><span class="tab-icon">🌐</span><span class="tab-label">3PM</span></div>
  </nav>
  <div class="content" id="content-area">
    <div class="state-box"><div class="spinner"></div><div class="msg">LOADING NBA DATA…</div></div>
  </div>
</div>

<!-- THRESHOLDS PAGE -->
<div id="thresholds-page">
  <div class="thresh-controls">
    <span class="ctrl-label">Stat</span>
    <div class="pill-group" id="t-stat-pills">
      <div class="pill active-all" data-tstat="pts" onclick="setThreshStat('pts')">Points</div>
      <div class="pill" data-tstat="reb" onclick="setThreshStat('reb')">Rebounds</div>
      <div class="pill" data-tstat="ast" onclick="setThreshStat('ast')">Assists</div>
      <div class="pill" data-tstat="tpm" onclick="setThreshStat('tpm')">3-Pointers</div>
    </div>
    <div class="sep"></div>
    <span class="ctrl-label">Threshold</span>
    <div class="pill-group" id="t-thresh-pills"></div>
    <div class="sep"></div>
    <span class="ctrl-label">Mode</span>
    <div class="pill-group">
      <div class="pill active-all" id="t-mode-all"  onclick="setThreshMode('all')">All</div>
      <div class="pill" id="t-mode-hot"  onclick="setThreshMode('hot')">🔥 Hot</div>
      <div class="pill" id="t-mode-cold" onclick="setThreshMode('cold')">🧊 Cold</div>
    </div>
    <div class="sep"></div>
    <span class="ctrl-label">Min GP</span>
    <div class="pill-group">
      <div class="pill active-all" data-tmingp="3"  onclick="setThreshMinGP(3,this)">3</div>
      <div class="pill" data-tmingp="5"  onclick="setThreshMinGP(5,this)">5</div>
      <div class="pill" data-tmingp="10" onclick="setThreshMinGP(10,this)">10</div>
    </div>
  </div>
  <div id="thresh-content">
    <div class="state-box"><div class="msg">Loading…</div></div>
  </div>
</div>

<!-- GAMES PAGE -->
<div id="games-page">
  <div id="games-grid"></div>
  <div id="game-detail"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="player-modal" onclick="closeModal(event)">
  <div class="modal" id="modal-content">
    <div class="state-box" style="padding:40px"><div class="spinner"></div></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG & STATE
// ═══════════════════════════════════════════════════════════
const CDN = 'https://cdn.nba.com/static/json';
const SCHED_URL = `${CDN}/staticData/scheduleLeagueV2_1.json`;
const SCOREBOARD_URL = `${CDN}/liveData/scoreboard/todaysScoreboard_00.json`;
const BOX_URL = id => `${CDN}/liveData/boxscore/boxscore_${id}.json`;

let masterPlayers = [];
let allPlayers    = [];
let currentStat   = 'pts';
let currentMode   = 'all';
let currentMinGP  = 3;
let sortCol = 'streak', sortDir = 'desc';
let todayGames    = [];
let refreshTimer  = null;
let currentPage   = 'players';

// Threshold state
let threshStat    = 'pts';
let threshVal     = 20;
let threshMode    = 'all';
let threshMinGP   = 3;
let threshSortCol = 'streak', threshSortDir = 'desc';

const STAT_CONFIG = {
  pts: { label:'Points',    hotLabel:'PTS Streak', coldLabel:'Scoring Drought', hotDesc:'consecutive games with a score',  coldDesc:'consecutive games under threshold', rateKey:'ppg',  rateLabel:'PPG',  color:'var(--pts)',  thresholds:[15,20,25,30], rateThresh:[15,22] },
  reb: { label:'Rebounds',  hotLabel:'REB Streak', coldLabel:'Board Drought',   hotDesc:'consecutive games with boards',   coldDesc:'consecutive games under threshold', rateKey:'rpg',  rateLabel:'RPG',  color:'var(--reb)',  thresholds:[4,6,8,10],   rateThresh:[4,7]   },
  ast: { label:'Assists',   hotLabel:'AST Streak', coldLabel:'Assist Drought',  hotDesc:'consecutive games with assists',  coldDesc:'consecutive games under threshold', rateKey:'apg',  rateLabel:'APG',  color:'var(--ast)',  thresholds:[4,6,8,10],   rateThresh:[4,7]   },
  tpm: { label:'3-Pointers',hotLabel:'3PM Streak', coldLabel:'3PM Drought',     hotDesc:'consecutive games with a 3PM',    coldDesc:'consecutive games under threshold', rateKey:'tppg', rateLabel:'3P/G', color:'var(--tpm)',  thresholds:[1,2,3,4],    rateThresh:[1,2.5] },
};

// ═══════════════════════════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════════════════════════
async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}: ${url}`);
  return r.json();
}

// Get ET date string
function getETDate() {
  return new Date(Date.now() - 4 * 3600000).toISOString().slice(0,10);
}

async function loadData() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true; btn.textContent = '↻ Loading…';

  try {
    // 1. Schedule: get last 14 days of game IDs
    const today = getETDate();
    const cutoff = new Date(Date.now() - 14 * 86400000 - 4 * 3600000).toISOString().slice(0,10);

    document.getElementById('content-area').innerHTML =
      `<div class="state-box"><div class="spinner"></div><div class="msg">FETCHING SCHEDULE…</div></div>`;

    const schedData = await fetchJSON(SCHED_URL);
    const gameDates = schedData.leagueSchedule.gameDates;

    // Collect recent regular season game IDs
    const recentGameIds = [];
    for (const dateObj of gameDates) {
      const raw = dateObj.gameDate.split(' ')[0]; // "03/29/2026"
      const [m, d, y] = raw.split('/');
      const dateStr = `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
      if (dateStr < cutoff || dateStr > today) continue;
      for (const g of (dateObj.games || [])) {
        if (g.gameId && g.gameId.startsWith('002')) {
          recentGameIds.push({ id: g.gameId, date: dateStr });
        }
      }
    }

    // 2. Today's scoreboard
    const sbData = await fetchJSON(SCOREBOARD_URL);
    todayGames = sbData.scoreboard.games || [];
    updateLiveBar();

    // 3. Fetch boxscores in batches
    const totalGames = recentGameIds.length;
    document.getElementById('content-area').innerHTML =
      `<div class="state-box"><div class="spinner"></div><div class="msg">LOADING GAME LOGS…<br><span style="font-size:9px;color:var(--muted)">fetching ${totalGames} games</span></div></div>`;

    const playerMap = {}; // personId -> playerData

    const BATCH = 12;
    for (let i = 0; i < recentGameIds.length; i += BATCH) {
      const batch = recentGameIds.slice(i, i + BATCH);
      const results = await Promise.allSettled(batch.map(g => fetchJSON(BOX_URL(g.id)).then(d => ({ data: d, date: g.date }))));
      for (const result of results) {
        if (result.status !== 'fulfilled') continue;
        const { data, date } = result.value;
        const game = data.game;
        for (const teamKey of ['homeTeam', 'awayTeam']) {
          const team = game[teamKey];
          for (const p of (team.players || [])) {
            if (!p.played || p.played !== '1') continue;
            const id = p.personId;
            const s = p.statistics;
            if (!playerMap[id]) {
              playerMap[id] = {
                id, name: p.name,
                teamTri: team.teamTricode,
                games: [],
                ppg: 0, rpg: 0, apg: 0, tppg: 0,
              };
            }
            playerMap[id].games.push({
              date,
              pts: s.points || 0,
              reb: s.reboundsTotal || 0,
              ast: s.assists || 0,
              tpm: s.threePointersMade || 0,
              min: s.minutes || '',
            });
          }
        }
      }
    }

    // Sort each player's games by date ascending, compute averages
    for (const p of Object.values(playerMap)) {
      p.games.sort((a,b) => a.date.localeCompare(b.date));
      const gp = p.games.length;
      p.gp   = gp;
      p.ppg  = gp ? +(p.games.reduce((s,g) => s+g.pts, 0) / gp).toFixed(1) : 0;
      p.rpg  = gp ? +(p.games.reduce((s,g) => s+g.reb, 0) / gp).toFixed(1) : 0;
      p.apg  = gp ? +(p.games.reduce((s,g) => s+g.ast, 0) / gp).toFixed(1) : 0;
      p.tppg = gp ? +(p.games.reduce((s,g) => s+g.tpm, 0) / gp).toFixed(1) : 0;
      // Store raw logs for threshold tab
      p.raw_pts = p.games.map(g => g.pts);
      p.raw_reb = p.games.map(g => g.reb);
      p.raw_ast = p.games.map(g => g.ast);
      p.raw_tpm = p.games.map(g => g.tpm);
      // Compute streaks at threshold=1
      p.streak_pts_hot  = calcHot(p.raw_pts, 1);
      p.streak_pts_cold = calcCold(p.raw_pts, 1);
      p.streak_reb_hot  = calcHot(p.raw_reb, 1);
      p.streak_reb_cold = calcCold(p.raw_reb, 1);
      p.streak_ast_hot  = calcHot(p.raw_ast, 1);
      p.streak_ast_cold = calcCold(p.raw_ast, 1);
      p.streak_tpm_hot  = calcHot(p.raw_tpm, 1);
      p.streak_tpm_cold = calcCold(p.raw_tpm, 1);
    }

    masterPlayers = Object.values(playerMap).filter(p => p.gp >= 1).sort((a,b) => b.ppg - a.ppg);
    allPlayers = masterPlayers.filter(p => p.gp >= currentMinGP);

    updateTimestamp();
    renderContent();
    if (currentPage === 'thresholds') renderThresholds();

    // Auto-refresh if live games
    const liveCount = todayGames.filter(g => g.gameStatus === 2).length;
    if (liveCount > 0) {
      clearTimeout(refreshTimer);
      refreshTimer = setTimeout(loadData, 45000);
    }

  } catch(e) {
    document.getElementById('content-area').innerHTML =
      `<div class="state-box"><div class="msg">⚠ ${e.message}</div></div>`;
  }

  btn.disabled = false; btn.textContent = '↻ Refresh';
}

// ═══════════════════════════════════════════════════════════
// STREAK CALC
// ═══════════════════════════════════════════════════════════
function calcHot(log, n) {
  let c = 0;
  for (let i = log.length-1; i >= 0; i--) { if (log[i] >= n) c++; else break; }
  return c;
}
function calcCold(log, n) {
  let c = 0;
  for (let i = log.length-1; i >= 0; i--) { if (log[i] < n) c++; else break; }
  return c;
}

// ═══════════════════════════════════════════════════════════
// LIVE BAR
// ═══════════════════════════════════════════════════════════
function updateLiveBar() {
  const bar = document.getElementById('live-bar');
  const badge = document.getElementById('live-badge');
  const live  = todayGames.filter(g => g.gameStatus === 2);
  const pre   = todayGames.filter(g => g.gameStatus === 1);
  const final = todayGames.filter(g => g.gameStatus === 3);

  if (live.length) { badge.classList.add('active'); bar.classList.add('active'); }
  else { badge.classList.remove('active'); }

  if (live.length || pre.length || final.length) {
    bar.classList.add('active');
    bar.innerHTML = [
      ...live.map(g =>  `<div class="live-chip">🔴 ${g.awayTeam.teamTricode} ${g.awayTeam.score} @ ${g.homeTeam.teamTricode} ${g.homeTeam.score} — ${g.gameStatusText}</div>`),
      ...pre.map(g =>   `<div class="final-chip">⏰ ${g.awayTeam.teamTricode} @ ${g.homeTeam.teamTricode} — ${g.gameStatusText}</div>`),
      ...final.map(g => `<div class="final-chip">✓ ${g.awayTeam.teamTricode} ${g.awayTeam.score} @ ${g.homeTeam.teamTricode} ${g.homeTeam.score}</div>`),
    ].join('');
  }
}

// ═══════════════════════════════════════════════════════════
// RENDER PLAYERS
// ═══════════════════════════════════════════════════════════
function getStreakKeys(stat) {
  return { hot: `streak_${stat}_hot`, cold: `streak_${stat}_cold` };
}

function renderContent() {
  const cfg = STAT_CONFIG[currentStat];
  const { hot: hotKey, cold: coldKey } = getStreakKeys(currentStat);
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  const isSearching = q.length > 0;

  const pool = isSearching
    ? masterPlayers.filter(p => p.name.toLowerCase().includes(q) || p.teamTri.toLowerCase().includes(q))
    : allPlayers;

  // At threshold=1 for players tab
  const withStreaks = pool.map(p => ({
    ...p,
    sHot:  calcHot(p[`raw_${currentStat}`]  || [], 1),
    sCold: calcCold(p[`raw_${currentStat}`] || [], 1),
  }));

  let hotData  = isSearching ? [...withStreaks].sort((a,b)=>b.sHot-a.sHot)  : withStreaks.filter(p=>p.sHot>0).sort((a,b)=>b.sHot-a.sHot);
  let coldData = isSearching ? [...withStreaks].sort((a,b)=>b.sCold-a.sCold) : withStreaks.filter(p=>p.sCold>0).sort((a,b)=>b.sCold-a.sCold);

  if (sortCol !== 'streak') {
    const sf = (a,b) => sortDir==='desc'?(b[sortCol]||0)-(a[sortCol]||0):(a[sortCol]||0)-(b[sortCol]||0);
    hotData.sort(sf); coldData.sort(sf);
  }

  const hotMax  = withStreaks.reduce((m,p)=>Math.max(m,p.sHot),1);
  const coldMax = withStreaks.reduce((m,p)=>Math.max(m,p.sCold),1);

  const sc = col => sortCol===col?'sort-'+sortDir:'';
  const thead = `<thead><tr>
    <th>#</th><th>Player</th>
    <th onclick="toggleSort('streak')" class="${sc('streak')}">Streak</th>
    <th onclick="toggleSort('gp')"   class="${sc('gp')}">GP</th>
    <th onclick="toggleSort('ppg')"  class="${sc('ppg')}">PPG</th>
    <th onclick="toggleSort('rpg')"  class="${sc('rpg')}">RPG</th>
    <th onclick="toggleSort('apg')"  class="${sc('apg')}">APG</th>
    <th onclick="toggleSort('tppg')" class="${sc('tppg')}">3P/G</th>
    <th onclick="toggleSort('${cfg.rateKey}')" class="${sc(cfg.rateKey)}">${cfg.rateLabel}</th>
    <th>Last 10G</th>
  </tr></thead>`;

  const buildRows = (data, type, maxVal) => data.slice(0,50).map((p,i) => {
    const sv  = type==='hot' ? p.sHot : p.sCold;
    const pct = Math.round(sv/maxVal*100);
    const rv  = p[cfg.rateKey] || 0;
    const rc  = rv >= cfg.rateThresh[1] ? 'rate-good' : rv >= cfg.rateThresh[0] ? 'rate-mid' : 'rate-low';
    const rawLog = (p[`raw_${currentStat}`]||[]).slice(-10);
    const dots = rawLog.map(v=>`<div class="gl-dot ${v>=1?'hit':'no'}"></div>`).join('');
    const init = p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    return `<tr style="cursor:pointer" onclick="openModal(${p.id})">
      <td>${i+1}</td>
      <td><div class="player-cell">
        <div class="player-avatar"><img src="https://cdn.nba.com/headshots/nba/latest/260x190/${p.id}.png" onerror="this.style.display='none';this.parentElement.textContent='${init}'" alt=""></div>
        <div><div class="player-name">${p.name}</div><div class="player-team">${p.teamTri}</div></div>
      </div></td>
      <td><div class="streak-cell">
        <div class="streak-num ${type}">${sv}</div>
        <div class="streak-bar-wrap"><div class="streak-bar ${type}" style="width:${pct}%"></div></div>
      </div></td>
      <td class="mono">${p.gp}</td>
      <td class="mono">${p.ppg}</td><td class="mono">${p.rpg}</td>
      <td class="mono">${p.apg}</td><td class="mono">${p.tppg}</td>
      <td class="mono ${rc}">${rv}</td>
      <td><div class="gl-dots">${dots}</div></td>
    </tr>`;
  }).join('');

  const showHot  = currentMode !== 'cold';
  const showCold = currentMode !== 'hot';
  let html = '';

  if (showHot) html += `
  <div class="section-header">
    <div class="section-title hot">🔥 ${cfg.hotLabel}</div>
    <div class="streak-meta">${cfg.hotDesc}</div>
    <div class="count-badge">${hotData.length} players</div>
  </div>
  <div class="table-wrap"><table>${thead}<tbody>${buildRows(hotData,'hot',hotMax)}</tbody></table></div>`;

  if (showCold) html += `
  <div class="section-header" style="${showHot?'margin-top:24px':''}">
    <div class="section-title cold">🧊 ${cfg.coldLabel}</div>
    <div class="streak-meta">${cfg.coldDesc}</div>
    <div class="count-badge">${coldData.length} players</div>
  </div>
  <div class="table-wrap"><table>${thead}<tbody>${buildRows(coldData,'cold',coldMax)}</tbody></table></div>`;

  if (!html) html = `<div class="state-box"><div class="msg">No players match filters.</div></div>`;
  document.getElementById('content-area').innerHTML = html;
}

// ═══════════════════════════════════════════════════════════
// THRESHOLDS
// ═══════════════════════════════════════════════════════════
function setThreshStat(stat) {
  threshStat = stat;
  document.querySelectorAll('[data-tstat]').forEach(el =>
    el.className = 'pill' + (el.dataset.tstat===stat?' active-all':''));
  const cfg = STAT_CONFIG[stat];
  if (!cfg.thresholds.includes(threshVal)) threshVal = cfg.thresholds[1];
  document.getElementById('t-thresh-pills').innerHTML = cfg.thresholds.map(v =>
    `<div class="pill${v===threshVal?' active-all':''}" onclick="setThreshVal(${v})">${v}+</div>`
  ).join('');
  renderThresholds();
}

function setThreshVal(v) {
  threshVal = v;
  document.querySelectorAll('#t-thresh-pills .pill').forEach((el,i) => {
    el.className = 'pill' + (STAT_CONFIG[threshStat].thresholds[i]===v?' active-all':'');
  });
  renderThresholds();
}

function setThreshMode(mode) {
  threshMode = mode;
  document.getElementById('t-mode-all').className  = 'pill'+(mode==='all'?' active-all':'');
  document.getElementById('t-mode-hot').className  = 'pill'+(mode==='hot'?' active-hot':'');
  document.getElementById('t-mode-cold').className = 'pill'+(mode==='cold'?' active-cold':'');
  renderThresholds();
}

function setThreshMinGP(n, el) {
  threshMinGP = n;
  document.querySelectorAll('[data-tmingp]').forEach(e => e.className='pill');
  el.className = 'pill active-all';
  renderThresholds();
}

function toggleThreshSort(col) {
  if (threshSortCol===col) threshSortDir = threshSortDir==='desc'?'asc':'desc';
  else { threshSortCol=col; threshSortDir='desc'; }
  renderThresholds();
}

function renderThresholds() {
  if (!masterPlayers.length) return;
  const cfg = STAT_CONFIG[threshStat];
  const N   = threshVal;
  const rawKey = `raw_${threshStat}`;
  const content = document.getElementById('thresh-content');
  const pool = masterPlayers.filter(p => p.gp >= threshMinGP);

  const withS = pool.map(p => {
    const raw  = p[rawKey] || [];
    const hot  = calcHot(raw, N);
    const cold = calcCold(raw, N);
    const dots10 = raw.slice(-10).map(v =>
      `<div class="gl-dot ${v>=N?'hit':'no'}" title="${v}"></div>`
    ).join('');
    return { ...p, tHot: hot, tCold: cold, dots10 };
  });

  const sf = (col,dir) => (a,b) => dir==='desc'?(b[col]||0)-(a[col]||0):(a[col]||0)-(b[col]||0);
  let hotData  = threshSortCol==='streak'
    ? withS.filter(p=>p.tHot>=1).sort((a,b)=>b.tHot-a.tHot)
    : withS.filter(p=>p.tHot>=1).sort(sf(threshSortCol,threshSortDir));
  let coldData = threshSortCol==='streak'
    ? withS.filter(p=>p.tCold>=1).sort((a,b)=>b.tCold-a.tCold)
    : withS.filter(p=>p.tCold>=1).sort(sf(threshSortCol,threshSortDir));

  const hotMax  = withS.reduce((m,p)=>Math.max(m,p.tHot),1);
  const coldMax = withS.reduce((m,p)=>Math.max(m,p.tCold),1);

  const tsc = col => threshSortCol===col?'sort-'+threshSortDir:'';
  const thead = `<thead><tr>
    <th>#</th><th>Player</th>
    <th onclick="toggleThreshSort('streak')" class="${tsc('streak')}">Streak</th>
    <th onclick="toggleThreshSort('gp')"   class="${tsc('gp')}">GP</th>
    <th onclick="toggleThreshSort('ppg')"  class="${tsc('ppg')}">PPG</th>
    <th onclick="toggleThreshSort('rpg')"  class="${tsc('rpg')}">RPG</th>
    <th onclick="toggleThreshSort('apg')"  class="${tsc('apg')}">APG</th>
    <th onclick="toggleThreshSort('tppg')" class="${tsc('tppg')}">3P/G</th>
    <th>${cfg.rateLabel}</th>
    <th>Last 10G</th>
  </tr></thead>`;

  const buildRows = (data, type, maxVal) => data.slice(0,50).map((p,i) => {
    const sv  = type==='hot' ? p.tHot : p.tCold;
    const pct = Math.round(sv/maxVal*100);
    const rv  = p[cfg.rateKey] || 0;
    const rc  = rv >= cfg.rateThresh[1]?'rate-good':rv>=cfg.rateThresh[0]?'rate-mid':'rate-low';
    const init = p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    return `<tr style="cursor:pointer" onclick="openModal(${p.id})">
      <td>${i+1}</td>
      <td><div class="player-cell">
        <div class="player-avatar"><img src="https://cdn.nba.com/headshots/nba/latest/260x190/${p.id}.png" onerror="this.style.display='none';this.parentElement.textContent='${init}'" alt=""></div>
        <div><div class="player-name">${p.name}</div><div class="player-team">${p.teamTri}</div></div>
      </div></td>
      <td><div class="streak-cell">
        <div class="streak-num ${type}">${sv}</div>
        <div class="streak-bar-wrap"><div class="streak-bar ${type}" style="width:${pct}%"></div></div>
      </div></td>
      <td class="mono">${p.gp}</td>
      <td class="mono">${p.ppg}</td><td class="mono">${p.rpg}</td>
      <td class="mono">${p.apg}</td><td class="mono">${p.tppg}</td>
      <td class="mono ${rc}">${rv}</td>
      <td><div class="gl-dots">${p.dots10}</div></td>
    </tr>`;
  }).join('');

  const showHot  = threshMode !== 'cold';
  const showCold = threshMode !== 'hot';
  let html = '';

  if (showHot) html += `
  <div class="section-header">
    <div class="section-title hot">🔥 ${N}+ ${cfg.label} — ${cfg.hotLabel}</div>
    <div class="streak-meta">Consecutive games with ${N}+ ${cfg.label.toLowerCase()}</div>
    <div class="count-badge">${hotData.length} players</div>
  </div>
  <div class="table-wrap"><table>${thead}<tbody>${buildRows(hotData,'hot',hotMax)}</tbody></table></div>`;

  if (showCold) html += `
  <div class="section-header" style="${showHot?'margin-top:24px':''}">
    <div class="section-title cold">🧊 Under ${N} ${cfg.label} — ${cfg.coldLabel}</div>
    <div class="streak-meta">Consecutive games without reaching ${N}+ ${cfg.label.toLowerCase()}</div>
    <div class="count-badge">${coldData.length} players</div>
  </div>
  <div class="table-wrap"><table>${thead}<tbody>${buildRows(coldData,'cold',coldMax)}</tbody></table></div>`;

  content.innerHTML = html || `<div class="state-box"><div class="msg">No players match filters.</div></div>`;
}

// ═══════════════════════════════════════════════════════════
// GAMES TAB
// ═══════════════════════════════════════════════════════════
function renderGamesGrid() {
  const container = document.getElementById('games-grid');
  const detail    = document.getElementById('game-detail');
  detail.innerHTML = ''; detail.classList.remove('active');

  if (!todayGames.length) {
    container.innerHTML = `<div class="state-box"><div class="msg">No games today.</div></div>`;
    return;
  }

  const sorted = [...todayGames].sort((a,b) => a.gameStatus-b.gameStatus || a.gameId.localeCompare(b.gameId));

  container.innerHTML = `<div class="games-grid">${sorted.map(g => {
    const isLive  = g.gameStatus === 2;
    const isFinal = g.gameStatus === 3;
    const isPre   = g.gameStatus === 1;
    const statusClass = isLive?'live':isFinal?'final':'pre';
    const clockStr = g.gameClock ? g.gameClock.replace('PT','').replace('M',':').replace('S','').replace(/\..*$/,'') : '';
    const statusText = isLive ? `🔴 Q${g.period} ${clockStr}` : isFinal ? '✓ FINAL' : `⏰ ${g.gameStatusText}`;
    const scoreHtml = (isLive||isFinal)
      ? `<div class="gc-score">${g.awayTeam.score} — ${g.homeTeam.score}</div><div class="gc-clock">${isLive?`Q${g.period} ${clockStr}`:''}</div>`
      : `<div class="gc-score" style="color:var(--muted);font-size:22px">VS</div>`;
    return `<div class="game-card${isLive?' live-card':''}" onclick="openGameDetail('${g.gameId}','${g.awayTeam.teamTricode}','${g.homeTeam.teamTricode}',${g.awayTeam.score},${g.homeTeam.score},'${statusText}')">
      <div class="gc-status ${statusClass}">${statusText}</div>
      <div class="gc-matchup">
        <div class="gc-team"><div class="gc-tri">${g.awayTeam.teamTricode}</div><div class="gc-name">${g.awayTeam.teamName||''}</div></div>
        <div class="gc-score-wrap">${scoreHtml}</div>
        <div class="gc-team"><div class="gc-tri">${g.homeTeam.teamTricode}</div><div class="gc-name">${g.homeTeam.teamName||''}</div></div>
      </div>
      <div class="gc-footer">Click to see streak leaders →</div>
    </div>`;
  }).join('')}`;
}

async function openGameDetail(gameId, awayTri, homeTri, awayScore, homeScore, statusText) {
  const container = document.getElementById('games-grid');
  const detail    = document.getElementById('game-detail');
  detail.innerHTML = `<div class="state-box"><div class="spinner"></div><div class="msg">LOADING…</div></div>`;
  detail.classList.add('active');
  container.style.display = 'none';

  try {
    const data = await fetchJSON(BOX_URL(gameId));
    const game = data.game;

    const statPills = Object.entries(STAT_CONFIG).map(([k,v]) =>
      `<div class="pill${k===currentStat?' active-all':''}" onclick="setStat('${k}');openGameDetail('${gameId}','${awayTri}','${homeTri}',${awayScore},${homeScore},'${statusText}')">${v.label}</div>`
    ).join('');

    function buildTeamPanel(teamData, label) {
      const players = (teamData.players||[]).filter(p=>p.played==='1');
      const cfg = STAT_CONFIG[currentStat];
      const { hot: hotKey, cold: coldKey } = getStreakKeys(currentStat);
      const statKey = { pts:'points', reb:'reboundsTotal', ast:'assists', tpm:'threePointersMade' }[currentStat];

      const rows = players.map(p => {
        const id = p.personId;
        const s  = p.statistics;
        const master = masterPlayers.find(mp => mp.id == id);
        const raw = master?.[`raw_${currentStat}`] || [];
        const hot  = calcHot(raw, 1);
        const cold = calcCold(raw, 1);
        const badgeVal  = hot>0?hot:cold>0?cold:0;
        const badgeType = hot>0?'hot':cold>0?'cold':'none';
        const todayVal  = s[statKey] || 0;
        const init = p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
        return { id, name: p.name, hot, cold, badgeVal, badgeType, todayVal, init, ppg: master?.ppg||0 };
      }).sort((a,b) => b.hot-a.hot||b.cold-a.cold);

      const rowHtml = rows.map((r,i) => `
        <div class="gp-row" onclick="openModal(${r.id})">
          <div class="gp-rank">${i+1}</div>
          <div style="width:26px;height:26px;border-radius:50%;background:var(--border2);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:8px;color:var(--muted2)">
            <img src="https://cdn.nba.com/headshots/nba/latest/260x190/${r.id}.png" style="width:100%;height:100%;object-fit:cover;border-radius:50%" onerror="this.style.display='none';this.parentElement.textContent='${r.init}'" alt="">
          </div>
          <div class="gp-info">
            <div class="gp-name">${r.name}</div>
            <div class="gp-stats">${cfg.rateLabel} ${r.ppg}</div>
          </div>
          <div class="gp-line">${cfg.label.slice(0,3).toUpperCase()}: ${r.todayVal}</div>
          <div class="gp-badge ${r.badgeType}">${r.badgeVal||'—'}</div>
        </div>`).join('');

      return `<div class="team-panel">
        <div class="team-panel-header"><span>${label}</span><span style="font-size:10px;font-family:'DM Mono',monospace;color:var(--muted)">${STAT_CONFIG[currentStat].hotLabel} ↓</span></div>
        ${rowHtml||'<div style="padding:16px;color:var(--muted);font-family:\'DM Mono\',monospace;font-size:11px;text-align:center">No data</div>'}
      </div>`;
    }

    detail.innerHTML = `
    <div class="gd-header">
      <button class="back-btn" onclick="backToGames()">← All Games</button>
      <div class="gd-title">${awayTri} @ ${homeTri}</div>
      <div class="gd-score">${statusText} · ${awayScore}–${homeScore}</div>
    </div>
    <div class="pill-group" style="margin-bottom:16px">${statPills}</div>
    <div class="teams-split">
      ${buildTeamPanel(game.awayTeam, awayTri)}
      ${buildTeamPanel(game.homeTeam, homeTri)}
    </div>`;

  } catch(e) {
    detail.innerHTML = `<div class="state-box"><div class="msg">⚠ ${e.message}</div></div>`;
  }
}

function backToGames() {
  document.getElementById('games-grid').style.display = '';
  document.getElementById('game-detail').classList.remove('active');
  document.getElementById('game-detail').innerHTML = '';
}

// ═══════════════════════════════════════════════════════════
// PLAYER MODAL
// ═══════════════════════════════════════════════════════════
function openModal(playerId) {
  const overlay = document.getElementById('player-modal');
  const content = document.getElementById('modal-content');
  overlay.classList.add('active');
  const p = masterPlayers.find(mp => mp.id == playerId);
  if (!p) { content.innerHTML = `<div class="state-box"><div class="msg">Player not found</div></div>`; return; }

  const init = p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const etDate = getETDate();

  // Streak pills for all 4 stats
  const pills = Object.entries(STAT_CONFIG).map(([sk, cfg]) => {
    const raw = p[`raw_${sk}`] || [];
    const hot  = calcHot(raw, 1);
    const cold = calcCold(raw, 1);
    if (hot  > 0) return `<div class="streak-pill hot">🔥 ${hot}G ${cfg.hotLabel}</div>`;
    if (cold > 0) return `<div class="streak-pill cold">🧊 ${cold}G ${cfg.coldLabel}</div>`;
    return `<div class="streak-pill zero">${cfg.label}: —</div>`;
  }).join('');

  // Last 10 games log
  const last10 = p.games.slice(-10);
  const logRows = last10.map(g => {
    const isToday = g.date === etDate;
    return `<tr class="${isToday?'today-row':''}">
      <td>${isToday?'<strong>Today</strong>':g.date.slice(5)}</td>
      <td class="${g.pts>=20?'hit-cell':''}">${g.pts}</td>
      <td class="${g.reb>=8?'hit-cell':''}">${g.reb}</td>
      <td class="${g.ast>=6?'hit-cell':''}">${g.ast}</td>
      <td class="${g.tpm>=3?'hit-cell':''}">${g.tpm}</td>
    </tr>`;
  }).join('');

  content.innerHTML = `
  <div class="modal-header">
    <div class="modal-avatar">
      <img src="https://cdn.nba.com/headshots/nba/latest/260x190/${p.id}.png" onerror="this.style.display='none';this.parentElement.textContent='${init}'" alt="">
    </div>
    <div>
      <div class="modal-name">${p.name}</div>
      <div class="modal-meta">${p.teamTri} · ${p.gp} games tracked · PPG ${p.ppg}</div>
    </div>
    <button class="modal-close" onclick="closeModal()">✕</button>
  </div>
  <div class="modal-body">
    <div class="modal-section-title">SEASON AVERAGES (LAST ${p.gp}G)</div>
    <div class="stat-snapshot">
      <div class="snap-box"><div class="snap-val" style="color:var(--pts)">${p.ppg}</div><div class="snap-lbl">PPG</div></div>
      <div class="snap-box"><div class="snap-val" style="color:var(--reb)">${p.rpg}</div><div class="snap-lbl">RPG</div></div>
      <div class="snap-box"><div class="snap-val" style="color:var(--ast)">${p.apg}</div><div class="snap-lbl">APG</div></div>
      <div class="snap-box"><div class="snap-val" style="color:var(--tpm)">${p.tppg}</div><div class="snap-lbl">3P/G</div></div>
      <div class="snap-box"><div class="snap-val">${p.gp}</div><div class="snap-lbl">GP</div></div>
    </div>
    <div class="modal-section-title">ACTIVE STREAKS</div>
    <div class="streak-pills">${pills}</div>
    <div class="modal-section-title">LAST ${last10.length} GAMES</div>
    ${last10.length ? `
    <table class="gl-table">
      <thead><tr><th>Date</th><th>PTS</th><th>REB</th><th>AST</th><th>3PM</th></tr></thead>
      <tbody>${logRows}</tbody>
    </table>` : '<div style="color:var(--muted);font-size:11px">No game data available.</div>'}
  </div>`;
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('player-modal')) {
    document.getElementById('player-modal').classList.remove('active');
  }
}

// ═══════════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════════
function setPage(page) {
  currentPage = page;
  const tabs = ['players','thresholds','games'];
  document.querySelectorAll('.page-tab').forEach((el,i) => el.classList.toggle('active', tabs[i]===page));
  document.getElementById('players-page').style.display       = page==='players'    ? 'flex'  : 'none';
  document.getElementById('players-controls').style.display   = page==='players'    ? ''      : 'none';
  document.getElementById('thresholds-page').classList.toggle('active', page==='thresholds');
  document.getElementById('games-page').classList.toggle('active', page==='games');
  if (page==='thresholds') { initThresholds(); }
  if (page==='games')      { renderGamesGrid(); }
}

function initThresholds() {
  if (!masterPlayers.length) return;
  setThreshStat(threshStat);
}

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('[data-mode]').forEach(el => {
    el.className = 'pill' + (el.dataset.mode===mode ? ` active-${mode==='all'?'all':mode}` : '');
  });
  renderContent();
}

function setMinGP(n, el) {
  currentMinGP = n;
  document.querySelectorAll('[data-mingp]').forEach(e => e.className='pill');
  el.className = 'pill active-all';
  allPlayers = masterPlayers.filter(p => p.gp >= currentMinGP);
  renderContent();
}

function setStat(stat) {
  currentStat = stat;
  document.querySelectorAll('[data-stat]').forEach(el => el.classList.toggle('active', el.dataset.stat===stat));
  sortCol='streak'; sortDir='desc';
  renderContent();
}

function toggleSort(col) {
  if (sortCol===col) sortDir=sortDir==='desc'?'asc':'desc';
  else { sortCol=col; sortDir='desc'; }
  renderContent();
}

function updateTimestamp() {
  document.getElementById('last-update').textContent =
    'Updated ' + new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}

// ─── BOOT ─────────────────────────────────────────────────
// Init threshold pills
setThreshStat('pts');
loadData();
</script>
